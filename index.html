<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Rocket League Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="scoreboard">
            <span id="score-blue" style="color: #3498db;">0</span>
            <span> - </span>
            <span id="score-orange" style="color: #e67e22;">0</span>
        </div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <p class="instructions">Use <strong>Arrow Keys</strong> to Drive/Steer. Push the ball into the orange goal!</p>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
